spring.application.name=api
server.port=8080

spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

app.rate-limit.login.max-attempts=${APP_RATE_LIMIT_LOGIN_MAX:5}
app.rate-limit.login.window-seconds=${APP_RATE_LIMIT_LOGIN_WINDOW:60}

app.supabase.url=${APP_SUPABASE_URL:}
app.supabase.service-role-key=${APP_SUPABASE_SERVICE_ROLE_KEY:}
app.supabase.storage.bucket-categorias=${APP_SUPABASE_STORAGE_BUCKET_CATEGORIAS:categorias}
app.supabase.storage.bucket-productos=${APP_SUPABASE_STORAGE_BUCKET_PRODUCTOS:productos}
app.supabase.storage.public-base-url-categorias=${APP_SUPABASE_PUBLIC_BASE_URL_CATEGORIAS:}
app.supabase.storage.public-base-url-productos=${APP_SUPABASE_PUBLIC_BASE_URL_PRODUCTOS:}
